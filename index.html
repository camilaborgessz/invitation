<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Jantar de Noivado · João & Camila</title>
  <meta name="description" content="Temos a alegria de convidar você para o nosso Jantar de Noivado — 20 de Junho de 2026, às 18:30." />
  <meta property="og:title" content="Jantar de Noivado · João & Camila" />
  <meta property="og:description" content="20 de Junho de 2025 · às 18:30 · Recanto dos Pioneiros" />
  <meta property="og:image" content="imgs/hero.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Jantar de Noivado · João & Camila" />
  <meta name="twitter:image" content="imgs/hero.png" />
  <link rel="icon" type="image/png" href="imgs/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: #fbeedd;
      background-image: radial-gradient(rgba(201, 169, 110, 0.12) 1px, transparent 1px);
      background-size: 18px 18px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      width: 393px;
      max-width: 100vw;
      background: #fbeedd;
      position: relative;
    }

    .hero {
      position: relative;
      width: 393px;
      height: 554px;
      border-radius: 0 0 250px 250px;
      overflow: hidden;
      z-index: 2;
    }

    .hero__photo {
      position: absolute;
      left: -0.56%;
      top: -7.04%;
      width: 100.64%;
      height: 107.15%;
      object-fit: cover;
      will-change: transform;
      animation: hero-zoom 1.6s ease forwards;
      filter: sepia(20%) contrast(1.05) brightness(0.95);
    }

    @keyframes hero-zoom {
      from { transform: scale(1.08); }
      to   { transform: scale(1); }
    }

    .hero__gradient {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 220px;
      background: linear-gradient(to top, rgba(20,12,5,0.72) 0%, transparent 100%);
      z-index: 1;
      pointer-events: none;
    }

    .hero__logo {
      position: absolute;
      left: 162px;
      top: 19px;
      width: 69px;
      height: 69px;
      object-fit: contain;
      z-index: 2;
      animation: logo-reveal 1.8s ease forwards;
    }

    @keyframes logo-reveal {
      from { opacity: 0; transform: rotate(-12deg) scale(0.85); }
      to   { opacity: 1; transform: rotate(0deg) scale(1); }
    }

    .hero__name {
      position: absolute;
      font-family: 'Pinyon Script', cursive;
      font-size: 48px;
      color: #ffffff;
      line-height: 1;
      z-index: 2;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.55);
      opacity: 0;
      animation: name-fadein 1s ease forwards;
    }
    .hero__name--joao   { animation-delay: 0.9s; }
    .hero__name--e      { animation-delay: 1.1s; }
    .hero__name--camila { animation-delay: 1.3s; }

    @keyframes name-fadein {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero__name--joao   { left: 118px; top: 404px; }
    .hero__name--e      { left: 210px; top: 422px; font-size: 48px; }
    .hero__name--camila { left: 143px; top: 454px; }

    .invite {
      position: relative;
      margin: -59px auto 0;
      width: 345px;
      height: 566px;
      border-radius: 200px 200px 0 0;
      overflow: hidden;
      z-index: 1;
      box-shadow: 0 -8px 40px rgba(66, 45, 28, 0.2);
    }

    .invite__photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter: sepia(30%) contrast(1.05) brightness(0.9);
    }

    .invite__overlay {
      position: absolute;
      inset: 0;
      background: rgba(66, 45, 28, 0.75);
    }

    .invite__subtitle {
      position: absolute;
      left: 23px;
      top: 126px;
      width: 299px;
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 20px;
      line-height: 1.241;
      letter-spacing: 0.06em;
      color: #ffffff;
      text-align: center;
      z-index: 2;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.4);
    }

    .invite__title {
      position: absolute;
      left: 25px;
      top: 268px;
      width: 296px;
      font-family: 'Pinyon Script', cursive;
      font-size: 56px;
      line-height: 0.7124;
      text-align: center;
      z-index: 2;
      background: linear-gradient(105deg, #fff 30%, #c9a96e 50%, #fff 70%);
      background-size: 250% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 4s linear infinite 1.5s;
    }

    @keyframes shimmer {
      from { background-position: 200% center; }
      to   { background-position: -200% center; }
    }

    .invite__divider {
      position: absolute;
      left: 33px;
      top: 485px;
      width: 279px;
      display: flex;
      align-items: center;
      z-index: 2;
    }

    .invite__divider-line {
      width: 100px;
      height: 1px;
      flex-shrink: 0;
    }
    .invite__divider-line:first-child {
      background: linear-gradient(to left, #c9a96e, transparent);
    }
    .invite__divider-line:last-child {
      background: linear-gradient(to right, #c9a96e, transparent);
    }

    .invite__rings {
      width: 57px;
      height: 81px;
      object-fit: contain;
      flex-shrink: 0;
      animation: rings-float 5s ease-in-out infinite;
      transform-origin: center;
    }

    @keyframes rings-float {
      0%, 100% { transform: rotate(-4deg) scale(1); }
      50%       { transform: rotate(4deg) scale(1.04); }
    }

    .photo-date {
      position: relative;
      width: 393px;
      margin-top: -85px;
      height: 596px;
      overflow: hidden;
      background: rgb(30, 30, 30);
    }

    .photo-date__photo {
      position: absolute;
      width: 100%;
      height: 108%;
      left: 0.01%;
      top: -7.27%;
      object-fit: cover;
      filter: sepia(18%) contrast(1.05) brightness(0.88);
    }

    .photo-date__gradient {
      position: absolute;
      left: 0;
      top: 85px;
      width: 393px;
      height: 521px;
      background: linear-gradient(
        179.95deg,
        rgba(30, 30, 30, 0.05) 0%,
        rgba(30, 30, 30, 0.55) 45%,
        rgb(30, 30, 30) 75%,
        rgb(111, 76, 46) 100%
      );
    }

    .date-block {
      position: absolute;
      left: 0;
      right: 0;
      margin: 0 auto;
      top: 320px;
      width: 300px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(201, 169, 110, 0.2);
      border-radius: 16px;
      padding: 18px 0 14px;
    }

    .date-row {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
    }

    .date-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100px;
      gap: 6px;
    }

    .date-line {
      width: 80px;
      height: 1px;
      background: #c9a96e;
    }

    .date-label {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 20px;
      line-height: 1;
      color: #c9a96e;
    }

    .date-day {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 64px;
      line-height: 1;
      color: #c9a96e;
      text-align: center;
      padding: 0 8px;
      transform: translateY(-8px);
    }

    .date-year {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.55);
      text-align: center;
      margin-top: 4px;
    }

    .date-countdown {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: #c9a96e;
      text-align: center;
      margin-top: 8px;
      opacity: 0.85;
    }

    .photo-date__address {
      position: absolute;
      left: 0;
      right: 0;
      margin: 0 auto;
      top: 468px;
      width: 233px;
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 20px;
      line-height: 1.08;
      color: #ffffff;
      text-align: center;
    }

    .photo-date__bairro {
      position: absolute;
      left: 0;
      right: 0;
      margin: 0 auto;
      top: 528px;
      width: 151px;
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.241;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
    }

    .cta {
      position: relative;
      width: 393px;
      height: 355px;
      background: #6f4c2e;
      overflow: visible;
      z-index: 3;
    }


    .cta__title {
      position: absolute;
      left: 0;
      right: 0;
      margin: 0 auto;
      top: 107px;
      width: 344px;
      font-family: 'Pinyon Script', cursive;
      font-size: 40px;
      line-height: 1.08;
      color: #ffffff;
      text-align: center;
    }

    .cta__btn {
      position: absolute;
      left: 0;
      right: 0;
      margin: 0 auto;
      top: 176px;
      width: 165px;
      height: 40px;
      background: rgba(66, 45, 28, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 50px;
      box-shadow: 0px 4px 25.8px 0px rgba(0, 0, 0, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: filter 0.2s, border-color 0.2s, transform 0.2s;
    }
    .cta__btn:hover {
      filter: brightness(1.25);
      border-color: rgba(255, 255, 255, 0.65);
      transform: scale(1.04);
    }

    .cta__btn-label {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.04em;
      line-height: 1;
      color: #ffffff;
    }

    .cta__logo {
      position: absolute;
      left: 164px;
      top: 239px;
      width: 69px;
      height: 69px;
      object-fit: contain;
    }

    .cta__lace {
      position: absolute;
      left: 0;
      width: 100%;
      pointer-events: none;
    }

    .cta__lace--top {
      top: -60px;
      z-index: 10;
    }

    .cta__lace--bottom {
      bottom: 0;
    }

    .cta__lace img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    @media (max-width: 393px) {
      .card, .hero, .photo-date, .cta { width: 100vw; }
      .invite { width: calc(100vw - 48px); }
    }

    @media (min-width: 394px) {
      body {
        align-items: flex-start;
        padding: 48px 0 80px;
        background: #e8d5b7;
      }
      .card {
        border-radius: 32px;
        overflow: hidden;
        box-shadow: 0 16px 64px rgba(66, 45, 28, 0.25);
      }
      .hero { width: 393px; }
      .photo-date, .cta { width: 393px; }
    }

    .anim {
      opacity: 0;
      transform: translateY(48px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }
    .anim.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .anim-delay-1 { transition-delay: 0.15s; }
    .anim-delay-2 { transition-delay: 0.30s; }
    .anim-delay-3 { transition-delay: 0.45s; }
    .anim-scale {
      opacity: 0;
      transform: scale(0.92);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .anim-scale.visible {
      opacity: 1;
      transform: scale(1);
    }
  </style>
</head>
<body>
<div class="card">

  <div class="hero">
    <img class="hero__photo"
      src="imgs/hero.png"
      alt="João e Camila" />
    <div class="hero__gradient"></div>
    <img class="hero__logo"
      src="imgs/logo.png"
      alt="monograma" />
    <span class="hero__name hero__name--joao">João</span>
    <span class="hero__name hero__name--e">e</span>
    <span class="hero__name hero__name--camila">Camila</span>
  </div>

  <div class="invite anim-scale">
    <img class="invite__photo"
      src="imgs/invite.png"
      alt="" aria-hidden="true" loading="lazy" />
    <div class="invite__overlay"></div>
    <p class="invite__subtitle anim anim-delay-1">Temos a alegria de lhe convidar para o nosso</p>
    <p class="invite__title anim anim-delay-2">Jantar de<br>noivado</p>
    <div class="invite__divider anim anim-delay-3">
      <div class="invite__divider-line"></div>
      <img class="invite__rings"
        src="imgs/aneis.png"
        alt="alianças" />
      <div class="invite__divider-line"></div>
    </div>
  </div>

  <div class="photo-date anim">
    <img class="photo-date__photo"
      src="imgs/casal.png"
      alt="Foto do casal" loading="lazy" />
    <!-- <div class="photo-date__gradient"></div> -->

    <div class="date-block anim anim-delay-1">
      <div class="date-row">
        <div class="date-col">
          <div class="date-line"></div>
          <span class="date-label">18:30</span>
          <div class="date-line"></div>
        </div>
        <span class="date-day">20</span>
        <div class="date-col">
          <div class="date-line"></div>
          <span class="date-label">Junho</span>
          <div class="date-line"></div>
        </div>
      </div> 
      <p class="date-countdown" id="countdown"></p>
    </div>

    <p class="photo-date__address anim anim-delay-2">Rua Antônio Pereira<br>de Lucena, 637 - Militar</p>
    <p class="photo-date__bairro anim anim-delay-3">Recanto dos Pioneiros</p>
  </div>

  <div class="cta anim">
    <p class="cta__title anim anim-delay-1">Confirme sua presença</p>
    <a class="cta__btn"
      href="https://docs.google.com/forms/d/12Rh0CLOQXJI4yGkk9teS4FAaDxyKmO-M5zvemgjIGgQ/edit"
      target="_blank" rel="noopener noreferrer">
      <span class="cta__btn-label">Clique aqui</span>
    </a>
    <img class="cta__logo"
      src="imgs/logo.png"
      alt="monograma" />
    <div class="cta__lace cta__lace--top">
      <img src="imgs/renda1.png" alt="" aria-hidden="true" />
    </div>
    <div class="cta__lace cta__lace--bottom">
      <img src="imgs/renda2.png" alt="" aria-hidden="true" />
    </div>
  </div>

</div>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12 });

  document.querySelectorAll('.anim, .anim-scale').forEach(el => observer.observe(el));

  const heroPhoto = document.querySelector('.hero__photo');
  window.addEventListener('scroll', () => {
    heroPhoto.style.transform = `translateY(${window.scrollY * 0.25}px)`;
  }, { passive: true });

  const eventDate = new Date('2026-06-20T18:30:00');
  function updateCountdown() {
    const diff = eventDate - new Date();
    const el = document.getElementById('countdown');
    if (!el) return;
    if (diff <= 0) { el.textContent = '✦ hoje é o grande dia ✦'; return; }
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    el.textContent = days === 1 ? '✦ falta 1 dia ✦' : `✦ faltam ${days} dias ✦`;
  }
  updateCountdown();
  setInterval(updateCountdown, 60000);
</script>
</body>
</html>
