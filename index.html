<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Jantar de Noivado · João & Camila</title>
  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fbeedd;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    /* ─── WRAPPER 393px (iPhone 16 do Figma) ─── */
    .card {
      width: 393px;
      max-width: 100vw;
      background: #fbeedd;
      position: relative;
    }

    /* ══════════════════════════════════
       ① HERO — Group 5 (node 11:8)
       w:393 h:554 rounded-bl/br 250px
    ══════════════════════════════════ */
    .hero {
      position: relative;
      width: 393px;
      height: 554px;
      border-radius: 0 0 250px 250px;
      overflow: hidden;
      z-index: 2;
    }

    .hero__photo {
      /* node 2:3: left:-0.56% top:-7.04% w:100.64% h:107.15% */
      position: absolute;
      left: -0.56%;
      top: -7.04%;
      width: 100.64%;
      height: 107.15%;
      object-fit: cover;
    }

    /* monograma: node 3:6 left:162 top:19 69×69 */
    .hero__logo {
      position: absolute;
      left: 162px;
      top: 19px;
      width: 69px;
      height: 69px;
      object-fit: contain;
      z-index: 2;
    }

    /* nomes — node 3:5: Pinyon Script 48px white
       João:   left:118 top:404
       e:      left:210 top:422
       Camila: left:143 top:454  */
    .hero__name {
      position: absolute;
      font-family: 'Pinyon Script', cursive;
      font-size: 48px;
      color: #ffffff;
      line-height: 1;
      z-index: 2;
    }
    .hero__name--joao   { left: 118px; top: 404px; }
    .hero__name--e      { left: 210px; top: 422px; font-size: 48px; }
    .hero__name--camila { left: 143px; top: 454px; }


    /* ══════════════════════════════════
       ② INVITE CARD
       node 3:15 (foto fundo arredondada)
       node 8:8  (overlay escuro)
       left:24 top:495 w:345 h:566
       border-radius topo: 200px
    ══════════════════════════════════ */
    .invite {
      position: relative;
      margin: -59px auto 0;
      width: 345px;
      height: 566px;
      border-radius: 200px 200px 0 0;
      overflow: hidden;
      z-index: 1;
    }

    .invite__photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    /* overlay rgba(66,45,28,0.85) */
    .invite__overlay {
      position: absolute;
      inset: 0;
      background: rgba(66, 45, 28, 0.85);
    }

    /* "Temos a alegria..." node 3:28
       x:47 y:621 → dentro do invite: 621-495=126px do topo
       w:299 h:68 Playfair 20px center */
    .invite__subtitle {
      position: absolute;
      left: 23px;   /* 47-24 (margem do card) = 23px dentro do invite */
      top: 126px;
      width: 299px;
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 20px;
      line-height: 1.241;
      color: #ffffff;
      text-align: center;
      z-index: 2;
    }

    /* "Jantar de noivado" node 3:20
       x:49 y:773 → 773-495=278px do topo
       w:296 Pinyon Script 48px */
    .invite__title {
      position: absolute;
      left: 25px;   /* 49-24 */
      top: 278px;
      width: 296px;
      font-family: 'Pinyon Script', cursive;
      font-size: 48px;
      line-height: 0.7124;
      color: #ffffff;
      text-align: center;
      z-index: 2;
    }

    /* divisor alianças — node 11:6
       x:57 y:980 → 980-495=485px do topo do invite
       w:279 */
    .invite__divider {
      position: absolute;
      left: 33px;   /* 57-24 */
      top: 485px;
      width: 279px;
      display: flex;
      align-items: center;
      z-index: 2;
    }

    .invite__divider-line {
      width: 100px;
      height: 1px;
      background: #d9d9d9;
      flex-shrink: 0;
    }

    /* ícone alianças — node 11:5 (mask group)
       x:168 y:980 w:57.23 h:80.84 */
    .invite__rings {
      width: 57px;
      height: 81px;
      object-fit: contain;
      flex-shrink: 0;
    }


    /* ══════════════════════════════════
       ③ FOTO + DATA
       node 13:5 (IMG_5623): left:0 top:976 w:397 h:596
       node 13:6 (gradient):  left:0 top:1061 w:393 h:521
    ══════════════════════════════════ */
    .photo-date {
      position: relative;
      width: 393px;
      /* invite termina em 495+566=1061, foto começa em 976 → sobe 85px */
      margin-top: -85px;
      height: 596px;
      overflow: hidden;
    }

    /* foto — h:100.24% left:0.01% top:-7.27% */
    .photo-date__photo {
      position: absolute;
      width: 100%;
      height: 100.24%;
      left: 0.01%;
      top: -7.27%;
      object-fit: cover;
    }

    /* gradient escuro — começa 85px abaixo (1061-976)
       h:521 linear-gradient(180°, rgba30/0.27→rgb30 83.6%) */
    .photo-date__gradient {
      position: absolute;
      left: 0;
      top: 85px;
      width: 393px;
      height: 521px;
      background: linear-gradient(
        179.95deg,
        rgba(30, 30, 30, 0.27) 0%,
        rgb(30, 30, 30) 83.566%
      );
    }

    /* bloco de data — node 14:23
       x:47 y:1331 → 1331-976=355px do topo do photo-date
       w:300 */
    .date-block {
      position: absolute;
      left: 0;
      right: 0;
      margin: 0 auto;
      top: 355px;
      width: 300px;
    }

    .date-row {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
    }

    .date-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100px;
      gap: 8px;
    }

    .date-line {
      width: 80px;
      height: 1px;
      background: #d9d9d9;
    }

    .date-label {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 20px;
      line-height: 1;
      color: #ffffff;
    }

    /* "20" — node 14:22, 64px */
    .date-day {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 64px;
      line-height: 1;
      color: #ffffff;
      text-align: center;
      padding: 0 8px;
      display: flex;
      align-items: center;
    }

    /* endereço — node 13:15
       y:1432 → 1432-976=456px
       x:80 w:233 Playfair 20px */
    .photo-date__address {
      position: absolute;
      left: 0;
      right: 0;
      margin: 0 auto;
      top: 456px;
      width: 233px;
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 20px;
      line-height: 1.08;
      color: #ffffff;
      text-align: center;
    }

    /* bairro — node 13:16
       y:1492 → 1492-976=516px
       w:151 Playfair 14px */
    .photo-date__bairro {
      position: absolute;
      left: 0;
      right: 0;
      margin: 0 auto;
      top: 516px;
      width: 151px;
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.241;
      color: #ffffff;
      text-align: center;
    }


    /* ══════════════════════════════════
       ④ CTA — node 15:29
       left:0 top:1582 w:393 h:355 bg:#6f4c2e
    ══════════════════════════════════ */
    .cta {
      position: relative;
      width: 393px;
      height: 355px;
      background: #6f4c2e;
      overflow: visible;
      z-index: 3;
    }

    /* "Confirme sua presença" — node 16:42
       x:25 y:1689 → 1689-1582=107px
       w:344 Pinyon Script 40px */
    .cta__title {
      position: absolute;
      left: 25px;
      top: 107px;
      width: 344px;
      font-family: 'Pinyon Script', cursive;
      font-size: 40px;
      line-height: 1.08;
      color: #ffffff;
      text-align: center;
    }

    /* botão — node 16:57
       x:114 y:1758 → 1758-1582=176px
       w:165 h:36 bg:rgba(66,45,28,0.85) radius:50px */
    .cta__btn {
      position: absolute;
      left: 114px;
      top: 176px;
      width: 165px;
      height: 36px;
      background: rgba(66, 45, 28, 0.85);
      border-radius: 50px;
      box-shadow: 0px 4px 25.8px 0px rgba(0, 0, 0, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: filter 0.2s;
    }
    .cta__btn:hover { filter: brightness(1.25); }

    /* "Clique aqui" — Playfair Bold 14px */
    .cta__btn-label {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 14px;
      line-height: 1.241;
      color: #ffffff;
    }

    /* logo rodapé — node 15:30
       x:164 y:1821 → 1821-1582=239px
       69×69 */
    .cta__logo {
      position: absolute;
      left: 164px;
      top: 239px;
      width: 69px;
      height: 69px;
      object-fit: contain;
    }

    .cta__lace {
      position: absolute;
      left: 0;
      width: 100%;
      pointer-events: none;
    }

    .cta__lace--top {
      top: -60px;
      z-index: 10;
    }

    .cta__lace--bottom {
      bottom: 0;
    }

    .cta__lace img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    @media (max-width: 393px) {
      .card, .hero, .photo-date, .cta { width: 100vw; }
      .invite { width: calc(100vw - 48px); }
    }

    /* ── DESKTOP ── */
    @media (min-width: 394px) {
      body {
        align-items: flex-start;
        padding: 48px 0 80px;
        background: #e8d5b7;
      }
      .card {
        border-radius: 32px;
        overflow: hidden;
        box-shadow: 0 16px 64px rgba(66, 45, 28, 0.25);
      }
      .hero { width: 393px; }
      .photo-date, .cta { width: 393px; }
    }

    /* ── ANIMAÇÕES DE SCROLL ── */
    .anim {
      opacity: 0;
      transform: translateY(48px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }
    .anim.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .anim-delay-1 { transition-delay: 0.15s; }
    .anim-delay-2 { transition-delay: 0.30s; }
    .anim-delay-3 { transition-delay: 0.45s; }
    .anim-scale {
      opacity: 0;
      transform: scale(0.92);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .anim-scale.visible {
      opacity: 1;
      transform: scale(1);
    }
  </style>
</head>
<body>
<div class="card">

  <!-- ① HERO -->
  <div class="hero">
    <img class="hero__photo"
      src="imgs/hero.png"
      alt="João e Camila" />
    <img class="hero__logo"
      src="imgs/logo.png"
      alt="monograma" />
    <span class="hero__name hero__name--joao">João</span>
    <span class="hero__name hero__name--e">e</span>
    <span class="hero__name hero__name--camila">Camila</span>
  </div>

  <!-- ② INVITE CARD -->
  <div class="invite anim-scale">
    <img class="invite__photo"
      src="imgs/invite.png"
      alt="" aria-hidden="true" />
    <div class="invite__overlay"></div>
    <p class="invite__subtitle anim anim-delay-1">Temos a alegria de lhe convidar para o nosso</p>
    <p class="invite__title anim anim-delay-2">Jantar de<br>noivado</p>
    <div class="invite__divider anim anim-delay-3">
      <div class="invite__divider-line"></div>
      <img class="invite__rings"
        src="imgs/aneis.png"
        alt="alianças" />
      <div class="invite__divider-line"></div>
    </div>
  </div>

  <!-- ③ FOTO + DATA -->
  <div class="photo-date anim">
    <img class="photo-date__photo"
      src="imgs/casal.png"
      alt="Foto do casal" />
    <div class="photo-date__gradient"></div>

    <div class="date-block anim anim-delay-1">
      <div class="date-row">
        <div class="date-col">
          <div class="date-line"></div>
          <span class="date-label">18:30</span>
          <div class="date-line"></div>
        </div>
        <span class="date-day">20</span>
        <div class="date-col">
          <div class="date-line"></div>
          <span class="date-label">Junho</span>
          <div class="date-line"></div>
        </div>
      </div>
    </div>

    <p class="photo-date__address anim anim-delay-2">Rua Antônio Pereira<br>de Lucena, 637 - Militar</p>
    <p class="photo-date__bairro anim anim-delay-3">Recanto dos Pioneiros</p>
  </div>

  <!-- ④ CTA -->
  <div class="cta anim">
    <p class="cta__title anim anim-delay-1">Confirme sua presença</p>
    <!-- ⬇️ Troque o href pelo link do seu Google Forms -->
    <a class="cta__btn"
      href="https://docs.google.com/forms/d/12Rh0CLOQXJI4yGkk9teS4FAaDxyKmO-M5zvemgjIGgQ/edit"
      target="_blank" rel="noopener noreferrer">
      <span class="cta__btn-label">Clique aqui</span>
    </a>
    <img class="cta__logo"
      src="imgs/logo.png"
      alt="monograma" />
    <div class="cta__lace cta__lace--top">
      <img src="imgs/renda1.png" alt="" aria-hidden="true" />
    </div>
    <div class="cta__lace cta__lace--bottom">
      <img src="imgs/renda2.png" alt="" aria-hidden="true" />
    </div>
  </div>

</div>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12 });

  document.querySelectorAll('.anim, .anim-scale').forEach(el => observer.observe(el));
</script>
</body>
</html>
